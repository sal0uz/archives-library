{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Archives Library – Sign In</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700;900&family=Source+Serif+4:wght@300;400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
:root{--bg:#0f0e0b;--bg2:#161410;--bg3:#1e1b15;--border:#3a3220;--gold:#c9a84c;--accent:#8b5e3c;--text:#f0e8d8;--text2:#c8b898;--text3:#907860;--red:#c0392b;--radius:8px}
*{margin:0;padding:0;box-sizing:border-box}
body{background:radial-gradient(ellipse at 20% 50%,rgba(201,168,76,.08) 0%,transparent 60%),radial-gradient(ellipse at 80% 20%,rgba(139,94,60,.1) 0%,transparent 50%),var(--bg);min-height:100vh;display:flex;align-items:center;justify-content:center;font-family:'Source Serif 4',serif;overflow:hidden;position:relative}
body::before{content:'';position:absolute;inset:0;background-image:repeating-linear-gradient(0deg,transparent,transparent 80px,rgba(201,168,76,.03) 80px,rgba(201,168,76,.03) 81px),repeating-linear-gradient(90deg,transparent,transparent 80px,rgba(201,168,76,.03) 80px,rgba(201,168,76,.03) 81px);pointer-events:none}
.deco{position:absolute;font-size:320px;color:rgba(201,168,76,.03);font-family:'Playfair Display',serif;font-weight:900;pointer-events:none;user-select:none;line-height:1}
.deco.l{left:-60px;bottom:-40px;transform:rotate(-15deg)}
.deco.r{right:-60px;top:-40px;transform:rotate(15deg)}
.auth-box{width:900px;max-width:95vw;background:var(--bg2);border:1px solid var(--border);border-radius:16px;overflow:hidden;display:grid;grid-template-columns:1fr 1fr;box-shadow:0 30px 80px rgba(0,0,0,.7),0 0 0 1px rgba(201,168,76,.1);position:relative;z-index:1}
.brand{background:linear-gradient(135deg,#1a1508 0%,#0f0e0b 50%,#1a1205 100%);padding:60px 40px;display:flex;flex-direction:column;justify-content:center;position:relative;overflow:hidden}
.brand::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 30% 70%,rgba(201,168,76,.15) 0%,transparent 60%)}
.brand-label{font-family:'Playfair Display',serif;font-size:13px;font-weight:600;color:var(--gold);letter-spacing:4px;text-transform:uppercase;margin-bottom:24px;position:relative}
.brand-label::before{content:'';display:block;width:40px;height:2px;background:var(--gold);margin-bottom:14px}
.brand h1{font-family:'Playfair Display',serif;font-size:46px;font-weight:900;color:var(--text);line-height:1.1;margin-bottom:18px;position:relative}
.brand h1 span{color:var(--gold)}
.brand p{color:var(--text3);font-size:14px;line-height:1.7;position:relative}
.brand-stats{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-top:36px;position:relative}
.bs{background:rgba(201,168,76,.05);border:1px solid rgba(201,168,76,.15);border-radius:8px;padding:14px}
.bs-num{font-family:'Playfair Display',serif;font-size:26px;font-weight:700;color:var(--gold)}
.bs-label{font-size:11px;color:var(--text3);margin-top:3px;letter-spacing:.5px;text-transform:uppercase}
.form-side{padding:50px 40px;display:flex;flex-direction:column;justify-content:center}
.tabs{display:flex;border-bottom:1px solid var(--border);margin-bottom:28px}
.tab{flex:1;padding:12px;background:none;border:none;color:var(--text3);font-family:'Source Serif 4',serif;font-size:15px;cursor:pointer;transition:all .2s;border-bottom:2px solid transparent;margin-bottom:-1px}
.tab.active{color:var(--gold);border-bottom-color:var(--gold)}
.form{display:none}.form.active{display:block}
.fg{margin-bottom:18px}
.fl{display:block;font-size:11px;letter-spacing:1.5px;text-transform:uppercase;color:var(--text3);margin-bottom:7px}
.fi{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius);padding:11px 14px;color:var(--text);font-family:'Source Serif 4',serif;font-size:14px;transition:all .2s;outline:none}
.fi:focus{border-color:var(--gold);box-shadow:0 0 0 3px rgba(201,168,76,.1)}
.fi::placeholder{color:var(--text3)}
.btn{width:100%;padding:13px;background:linear-gradient(135deg,var(--gold),var(--accent));border:none;border-radius:var(--radius);color:#0f0e0b;font-family:'Playfair Display',serif;font-size:15px;font-weight:700;cursor:pointer;transition:all .2s;letter-spacing:.5px;margin-top:6px}
.btn:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(201,168,76,.3)}
.btn:disabled{opacity:.6;cursor:not-allowed;transform:none}
.err{background:rgba(192,57,43,.12);border:1px solid rgba(192,57,43,.3);color:#e74c3c;padding:10px 14px;border-radius:var(--radius);font-size:13px;margin-bottom:14px;display:none}
@media(max-width:700px){.auth-box{grid-template-columns:1fr}.brand{display:none}}
</style>
</head>
<body>
<div class="deco l">𝔸</div>
<div class="deco r">ℬ</div>
<div class="auth-box">
  <div class="brand">
    <div class="brand-label">Archives Library</div>
    <h1>Discover<br>the World of<br><span>Knowledge</span></h1>
    <p>A curated digital archive of books, journals and manuscripts from around the world.</p>
  </div>
  <div class="form-side">
    <div class="tabs">
      <button class="tab active" onclick="switchTab('login')">Sign In</button>
      <button class="tab" onclick="switchTab('signup')">Create Account</button>
    </div>
    <div id="login-err" class="err"></div>
    <div id="signup-err" class="err"></div>

    <form class="form active" id="login-form">
      <div class="fg"><label class="fl">Username</label><input type="text" id="l-user" class="fi" placeholder="Enter your username" autocomplete="username"></div>
      <div class="fg"><label class="fl">Password</label><input type="password" id="l-pass" class="fi" placeholder="Enter your password" autocomplete="current-password"></div>
      <button type="button" class="btn" id="login-btn" onclick="doLogin()">Sign In to Library</button>
    </form>

    <form class="form" id="signup-form">
      <div class="fg"><label class="fl">Full Name</label><input type="text" id="s-name" class="fi" placeholder="Your full name"></div>
      <div class="fg"><label class="fl">Username</label><input type="text" id="s-user" class="fi" placeholder="Choose a username" autocomplete="username"></div>
      <div class="fg"><label class="fl">Email</label><input type="email" id="s-email" class="fi" placeholder="your@email.com" autocomplete="email"></div>
      <div class="fg"><label class="fl">Password</label><input type="password" id="s-pass" class="fi" placeholder="At least 6 characters" autocomplete="new-password"></div>
      <button type="button" class="btn" id="signup-btn" onclick="doSignup()">Create Account</button>
    </form>
  </div>
</div>

<script>
function switchTab(t){
  document.querySelectorAll('.tab').forEach((el,i)=>el.classList.toggle('active',(i===0&&t==='login')||(i===1&&t==='signup')));
  document.getElementById('login-form').classList.toggle('active',t==='login');
  document.getElementById('signup-form').classList.toggle('active',t==='signup');
}
function showErr(id,msg){const e=document.getElementById(id);e.textContent=msg;e.style.display='block';setTimeout(()=>e.style.display='none',4000)}

async function doLogin(){
  const btn=document.getElementById('login-btn');
  btn.disabled=true;btn.textContent='Signing in…';
  const fd=new FormData();
  fd.append('username',document.getElementById('l-user').value.trim());
  fd.append('password',document.getElementById('l-pass').value);
  fd.append('csrfmiddlewaretoken','{{ csrf_token }}');
  const r=await fetch('/login/',{method:'POST',body:fd});
  const d=await r.json();
  if(d.ok)window.location.href=d.redirect;
  else{showErr('login-err',d.error);btn.disabled=false;btn.textContent='Sign In to Library'}
}
async function doSignup(){
  const btn=document.getElementById('signup-btn');
  btn.disabled=true;btn.textContent='Creating account…';
  const fd=new FormData();
  fd.append('full_name',document.getElementById('s-name').value.trim());
  fd.append('username',document.getElementById('s-user').value.trim());
  fd.append('email',document.getElementById('s-email').value.trim());
  fd.append('password',document.getElementById('s-pass').value);
  fd.append('csrfmiddlewaretoken','{{ csrf_token }}');
  const r=await fetch('/register/',{method:'POST',body:fd});
  const d=await r.json();
  if(d.ok)window.location.href=d.redirect;
  else{showErr('signup-err',d.error);btn.disabled=false;btn.textContent='Create Account'}
}
document.querySelectorAll('.fi').forEach(f=>f.addEventListener('keydown',e=>{if(e.key==='Enter'){const fb=document.querySelector('.form.active .btn');if(fb)fb.click()}}));
</script>
</body>
</html>
